<!doctype html>
<html lang="en" data-theme="gruvbox-dark">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, interactive-widget=resizes-content"
    />
    <title>Raphael Bitton</title>
    <meta name="color-scheme" content="dark light" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="favicon.png" />
    <!-- Apply saved theme before the stylesheet paints so a non-default
         theme doesn't briefly flash gruvbox-dark on reload. -->
    <script>
      try {
        var t = localStorage.getItem("theme");
        if (t) document.documentElement.dataset.theme = t;
      } catch (_) {}
    </script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="terminal" aria-label="rbitton.com terminal">
      <pre id="screen" class="screen" aria-hidden="true"></pre>
      <!-- VM mode container — populated by v86 when `boot tinycore`
           runs. Hidden by default; activated via JS, not CSS only,
           so the rest of the page only carries the cost when used. -->
      <div id="vm" hidden>
        <div class="vm-banner">
          tinycore linux —
          <kbd>Ctrl</kbd>+<kbd>Alt</kbd>+<kbd>Q</kbd>
          to exit back to the terminal
        </div>
        <div id="vm-screen">
          <div class="vm-text" style="white-space: pre; font-family: inherit"></div>
          <canvas class="vm-canvas"></canvas>
        </div>
      </div>
      <noscript>
        <pre class="screen">
rbitton.com — personal site of Raphael Bitton.
JavaScript is off, so the terminal theater is disabled.
Contact: raphael@skylantix.com
        </pre>
      </noscript>
    </main>
    <input
      id="stdin"
      type="text"
      aria-label="terminal input"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    />
    <script type="module" src="src/main.js"></script>
  </body>
</html>
